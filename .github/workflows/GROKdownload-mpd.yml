name: Download MPD URL

on:
  workflow_dispatch:
  #schedule:
  #  - cron: "0 */4 * * *"   # ogni 4 ore

jobs:
  mpd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install BotBrowser
        run: npm install @botbrowser/puppeteer

      - name: Run script
        run: node download-mpd.js

      - name: Commit MPD URL
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add mpd-url.txt
          git commit -m "Update MPD URL"
          git push
