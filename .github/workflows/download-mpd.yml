name: Download MPD with Tokens

on:
  workflow_dispatch:  # Esegui manualmente
  #schedule:
 #   - cron: '0 8 * * *'  # Ogni giorno alle 8 (opzionale)

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Puppeteer script
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}      # URL della pagina video
          LOGIN_USER: ${{ secrets.LOGIN_USER }}
          LOGIN_PASS: ${{ secrets.LOGIN_PASS }}
        run: node download-mpd.js

      - name: Commit & Push MPD
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.mpd
          git commit -m "Update MPD $(date)" || echo "No changes"
          git push
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpd-files
          path: "*.mpd"
