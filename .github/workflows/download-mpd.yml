name: Download MPD with Tokens

on:
  workflow_dispatch:
  #schedule:
  #  - cron: '0 9 * * *'   # ogni giorno alle 9

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22 (attuale stabile)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm init -y   # crea package.json se non esiste
          npm install puppeteer
          # npm ci   ← sostituito perché non c'era lockfile

      - name: Run MPD Downloader
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          # LOGIN_USER: ${{ secrets.LOGIN_USER }}
          # LOGIN_PASS: ${{ secrets.LOGIN_PASS }}
        run: node download-mpd.js

      - name: Commit & Push MPD files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if ls *.mpd > /dev/null 2>&1; then
            git add *.mpd mpd-url.txt 2>/dev/null || true
            git commit -m "Update MPD files - $(date '+%Y-%m-%d %H:%M')" || echo "No new MPD files"
            git push
          else
            echo "⚠️ Nessun file MPD trovato"
          fi
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mpd-files
          path: |
            *.mpd
            mpd-url.txt
